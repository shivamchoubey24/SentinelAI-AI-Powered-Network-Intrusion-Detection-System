# Application Configuration

# General Settings
app:
  name: "AI Network Security System"
  version: "1.0.0"
  environment: "development"  # development, staging, production

# Database Configuration
database:
  mongodb:
    host: "localhost"
    port: 27017
    database: "network_security"
    collections:
      logs: "security_logs"
      alerts: "security_alerts"
      models: "model_metadata"
      blockchain: "blockchain_records"
  
  postgresql:
    host: "localhost"
    port: 5432
    database: "security_db"
    tables:
      users: "users"
      audit: "audit_trail"
      metrics: "performance_metrics"

# ETL Pipeline Configuration
etl:
  batch_size: 1000
  processing_interval: 60  # seconds
  max_retries: 3
  timeout: 300  # seconds
  
  data_sources:
    - name: "firewall_logs"
      path: "data/raw/firewall/"
      format: "csv"
    - name: "network_traffic"
      path: "data/raw/traffic/"
      format: "pcap"
    - name: "system_logs"
      path: "data/raw/system/"
      format: "json"

# Model Configuration
model:
  architecture: "MLP-GRU"
  input_features: 78
  hidden_layers: [128, 64, 32]
  gru_units: 64
  dropout_rate: 0.3
  learning_rate: 0.001
  batch_size: 256
  epochs: 50
  validation_split: 0.2
  
  training:
    optimizer: "adam"
    loss: "binary_crossentropy"
    metrics: ["accuracy", "precision", "recall", "f1_score"]
    early_stopping_patience: 10
    
  retraining:
    schedule: "weekly"  # daily, weekly, monthly
    min_new_samples: 1000
    performance_threshold: 0.85
    drift_threshold: 0.1

# MLOps Configuration
mlops:
  tracking:
    mlflow_uri: "http://localhost:5000"
    experiment_name: "network_security"
    
  model_registry:
    staging_threshold: 0.90
    production_threshold: 0.95
    
  monitoring:
    enable_drift_detection: true
    drift_check_interval: 3600  # seconds
    alert_on_drift: true

# Blockchain Configuration
blockchain:
  enabled: true
  network: "ethereum"  # ethereum, hyperledger
  consensus: "PoW"  # PoW, PoS, PoA
  
  smart_contract:
    gas_limit: 3000000
    gas_price: 20  # gwei
    
  ipfs:
    host: "localhost"
    port: 5001
    pin_files: true

# Threat Detection Configuration
threat_detection:
  threat_types:
    - "intrusion"
    - "malware"
    - "phishing"
    - "ddos"
    - "data_exfiltration"
    - "privilege_escalation"
    
  severity_levels:
    critical: 0.9
    high: 0.7
    medium: 0.5
    low: 0.3
    
  response_actions:
    critical: ["block", "alert", "isolate"]
    high: ["alert", "monitor"]
    medium: ["log", "monitor"]
    low: ["log"]

# Alert Configuration
alerts:
  channels:
    - type: "email"
      enabled: true
      recipients: ["admin@example.com"]
    - type: "slack"
      enabled: false
      webhook_url: ""
    - type: "dashboard"
      enabled: true
      
  rules:
    - name: "Multiple Failed Logins"
      condition: "failed_login_attempts > 5"
      severity: "high"
      action: "alert"
    - name: "Unusual Traffic Pattern"
      condition: "anomaly_score > 0.8"
      severity: "critical"
      action: "block"

# Dashboard Configuration
dashboard:
  refresh_interval: 5  # seconds
  max_display_records: 1000
  charts:
    - "threat_timeline"
    - "attack_distribution"
    - "model_performance"
    - "system_health"
    
  widgets:
    - "live_alerts"
    - "threat_map"
    - "top_threats"
    - "blocked_ips"

# API Configuration
api:
  cors_origins:
    - "http://localhost:8501"
    - "http://localhost:3000"
  rate_limit: 100  # requests per minute
  timeout: 30  # seconds
  
  endpoints:
    - "/api/v1/threats"
    - "/api/v1/alerts"
    - "/api/v1/logs"
    - "/api/v1/models"
    - "/api/v1/blockchain"

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"
  
  handlers:
    - type: "file"
      filename: "logs/application.log"
      max_bytes: 10485760  # 10MB
      backup_count: 5
    - type: "console"
      enabled: true
    - type: "elasticsearch"
      enabled: false
      host: "localhost"
      port: 9200

# Performance Configuration
performance:
  cache:
    enabled: true
    ttl: 3600  # seconds
    max_size: 1000
    
  optimization:
    use_gpu: true
    num_workers: 4
    prefetch_factor: 2
    
  limits:
    max_concurrent_requests: 100
    max_file_size: 104857600  # 100MB
    max_batch_size: 10000

# Security Configuration
security:
  authentication:
    enabled: true
    jwt_secret_key: "change_this_secret_key"
    token_expiry: 3600  # seconds
    
  encryption:
    algorithm: "AES-256"
    key_rotation_days: 90
    
  access_control:
    enable_rbac: true
    roles:
      - admin
      - analyst
      - viewer
